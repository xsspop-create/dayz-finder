<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayZ Class Finder | APP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <div class="brand">
                    <img src="logo.png" alt="Logo" class="app-logo">
                    <div class="title-meta">
                        <h1>DayZ Class Finder</h1>
                        <span class="status-badge" id="data-status">Conectando...</span>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <div class="multi-search">
                    <div class="field-group">
                        <label>ClassName</label>
                        <input type="text" id="classSearch" placeholder="Ex: MMG_JPC..." autocomplete="off">
                    </div>
                    <div class="field-group">
                        <label>DisplayName</label>
                        <input type="text" id="displaySearch" placeholder="Ex: Vest..." autocomplete="off">
                    </div>
                </div>

                <div class="search-wrapper">
                    <button id="backBtn" class="back-btn">
                        <i data-lucide="arrow-left"></i> Voltar
                    </button>
                    <div class="search-container">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Pesquisa geral em todas as colunas..." autocomplete="off">
                    </div>
                </div>

                <div id="filtersBar" class="filters-bar">
                    <!-- Categorias virão aqui -->
                </div>
            </div>

        </header>

        <main id="resultsGrid" class="results-grid">
            <div class="loader">Sincronizando banco de dados...</div>
        </main>
    </div>

    <!-- Modal de Detalhes -->
    <div id="modalOverlay">
        <div class="modal-content">
            <i data-lucide="x" class="close-modal" id="closeModal"></i>
            <div id="modalBody">
                <!-- Conteúdo dinâmico do item -->
            </div>
        </div>
    </div>

    <!-- Notificação Toast -->
    <div id="copyToast" class="toast">Copiado para o clipboard!</div>

    <script src="app.js"></script>
</body>
</html>
